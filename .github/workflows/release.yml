name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Typecheck web dashboard
        working-directory: web
        run: pnpm typecheck

      - name: Build web dashboard
        working-directory: web
        run: pnpm build

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

  linux-binary:
    name: Linux binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs:
      - verify
      - web-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu

    env:
      TARGET: ${{ matrix.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Download web dashboard bundle
        uses: actions/download-artifact@v4
        with:
          name: web-dashboard-dist
          path: web-dist

      - name: Install native Linux build dependencies
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libudev-dev

      - name: Set up cross toolchain
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}
          package: libudev-dev

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target "$TARGET"

      - name: Package binary
        run: |
          set -euo pipefail
          archive="serialport-api-${GITHUB_REF_NAME}-${TARGET}.tar.gz"
          package_dir="dist/${TARGET}/serialport-api"
          rm -rf "dist/${TARGET}"
          mkdir -p "$package_dir"
          cp "target/${TARGET}/release/serialport-api" "$package_dir/"
          cp README.md LICENSE "$package_dir/"
          mkdir -p "$package_dir/web"
          cp -R web-dist/. "$package_dir/web/"
          {
            echo "name=serialport-api"
            echo "tag=${GITHUB_REF_NAME}"
            echo "target=${TARGET}"
            echo "commit=${GITHUB_SHA}"
            echo "web_bundle=web/dist"
            echo "web_built=true"
          } > "$package_dir/ARTIFACT.txt"
          tar -C "dist/${TARGET}" -czf "$archive" serialport-api
          sha256sum "$archive" > "$archive.sha256"

      - name: Verify package contents
        run: |
          set -euo pipefail
          archive="serialport-api-${GITHUB_REF_NAME}-${TARGET}.tar.gz"
          tar -tzf "$archive" | grep -Fx "serialport-api/web/index.html"
          tar -tzf "$archive" | grep -E '^serialport-api/web/assets/.+\.(js|css)$'
          tar -xOzf "$archive" serialport-api/ARTIFACT.txt | grep -Fx "web_built=true"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            serialport-api-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            serialport-api-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

  web-build:
    name: Build web dashboard bundle
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web dashboard
        working-directory: web
        run: pnpm build

      - name: Upload web dashboard bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-dashboard-dist
          path: web/dist
          if-no-files-found: error

  docker-image:
    name: Docker image
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
          flavor: |
            latest=false

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
